<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Euromilhões</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bola{
            width:50px;
            height:50px;
            line-height:50px;
            border-radius:50%;
            display:inline-block;
            text-align:center;
            margin:5px;
            font-weight:bold;
        }

        .numero{
            background:#ffc107;
            color:#000;
        }

        .estrela{
            background:#0d6efd;
            color:#fff;
            clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
            width:60px;
            height:60px;
            line-height:65px;
        }

        .chave{
            margin-bottom:15px;
        }
    </style>
</head>

<body class="bg-dark text-white text-center p-4">

<h1 class="mb-4">Gerador Euromilhões</h1>

<!-- Selecionar quantidade -->
<div class="mb-4">
    <label class="form-label">Quantas chaves quer gerar?</label>
    <input type="number" id="quantidade" class="form-control w-25 mx-auto" min="1" max="20" value="1">
</div>

<button class="btn btn-warning btn-lg mb-4" onclick="gerarChaves()">Gerar Chaves</button>

<div id="resultado"></div>

<script>

function gerarChaves(){

    const res = document.getElementById("resultado");
    const qtd = document.getElementById("quantidade").value;

    res.innerHTML = "";

    for(let i=0;i<qtd;i++){

        let chave = document.createElement("div");
        chave.className="chave";

        // números
        let nums = new Set();
        while(nums.size<5){
            nums.add(Math.floor(Math.random()*50)+1);
        }

        [...nums].sort((a,b)=>a-b).forEach(n=>{
            chave.innerHTML += `<span class="bola numero">${n}</span>`;
        });

        // estrelas
        let ests = new Set();
        while(ests.size<2){
            ests.add(Math.floor(Math.random()*12)+1);
        }

        [...ests].sort((a,b)=>a-b).forEach(e=>{
            chave.innerHTML += `<span class="bola estrela">${e}</span>`;
        });

        res.appendChild(chave);
    }

}

</script>

</body>
</html>
