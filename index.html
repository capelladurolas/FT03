<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euromilhões</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        .bola { width: 40px; height: 40px; line-height: 40px; border-radius: 50%; display: inline-block; text-align: center; margin: 5px; font-weight: bold; }
        .n { background: #ffc107; color: #000; }
        .e { background: #0d6efd; color: #fff; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); width: 45px; height: 45px; line-height: 50px; }
        .chave { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fff; color: #000; }
    </style>
</head>
<body class="bg-light p-4 text-center">

    <div class="container" style="max-width: 500px;">
        <h2 class="mb-4">Gerador Euromilhões</h2>
        
        <!-- BOX DE SELEÇÃO -->
        <div class="card p-3 mb-4 shadow-sm">
            <label class="form-label">Quantas chaves queres gerar?</label>
            <input type="number" id="qtd" class="form-control mb-3 text-center" value="1" min="1" max="10">
            <button onclick="gerar()" class="btn btn-success w-100">Gerar Chaves</button>
        </div>

        <!-- ÁREA DOS RESULTADOS -->
        <div id="resultados"></div>
    </div>

    <script>
        function gerar() {
            const qtd = document.getElementById('qtd').value;
            const res = document.getElementById('resultados');
            res.innerHTML = ''; // Limpa as anteriores

            for (let i = 0; i < qtd; i++) {
                let nums = new Set();
                while(nums.size < 5) nums.add(Math.floor(Math.random() * 50) + 1);
                let ests = new Set();
                while(ests.size < 2) ests.add(Math.floor(Math.random() * 12) + 1);

                let html = `<div class="chave shadow-sm"><strong>Chave ${i+1}:</strong><br>`;
                [...nums].sort((a,b)=>a-b).forEach(n => html += `<div class="bola n">${n}</div>`);
                [...ests].sort((a,b)=>a-b).forEach(e => html += `<div class="bola e">${e}</div>`);
                html += `</div>`;
                
                res.innerHTML += html;
            }
        }
    </script>
</body>
</html>
